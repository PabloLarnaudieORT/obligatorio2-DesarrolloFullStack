<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRONLOG - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="fondo-completo"></div>

    <main class="contenedor-flex">
        <div class="banner">
            <div class="logo-grande">IRON<span class="acento">LOG</span></div>
            <h1>Tu cambio<br>empieza con<br>una decisión.</h1>
            <p>Completá tus datos y comenzá a transformar tu físico hoy mismo.</p>
        </div>

        <div class="formulario-zona">
            <div class="tarjeta">
                <h2 class="mb-4">Crear cuenta</h2>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" class="form-control campo" placeholder="Elegí tu nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control campo" placeholder="ejemplo@correo.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control campo" placeholder="••••••••">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Repetir Contraseña</label>
                        <input type="password" class="form-control campo" placeholder="••••••••">
                    </div>
                    
                    <button type="button" class="btn btn-principal w-100 mb-3">Completar Registro</button>
                    <a href="login.html" class="btn-secundario d-block text-center">Volver al inicio</a>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
